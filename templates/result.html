<!DOCTYPE html>
<html>
<head>
    <title>Student Result</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <h1>Smart Student Result Management System</h1>

    <div class="container">

        <h2>Student Report Card</h2>

        <table>

            <tr>
                <th>Name</th>
                <td>{{ name }}</td>
            </tr>

            <tr>
                <th>Roll Number</th>
                <td>{{ roll_no }}</td>
            </tr>

            <tr>
                <th>Class</th>
                <td>{{ student_class }}</td>
            </tr>

            <tr>
                <th>Math Marks</th>
                <td>{{ math }}</td>
            </tr>

            <tr>
                <th>Science Marks</th>
                <td>{{ science }}</td>
            </tr>

            <tr>
                <th>English Marks</th>
                <td>{{ english }}</td>
            </tr>

            <tr>
                <th>Total Marks</th>
                <td>{{ total }}/300</td>
            </tr>

            <tr>
                <th>Percentage</th>
                <td>{{ percentage }}%</td>
            </tr>

            <tr>
                <th>Grade</th>
                <td>{{ grade }}</td>
            </tr>

        </table>

    </div>

</body>
</html>
